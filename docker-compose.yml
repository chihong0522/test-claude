services:
  # ── Trading Bot ──────────────────────────────────────────────
  bot:
    build: .
    container_name: polymarket-bot
    env_file: .env
    volumes:
      - ./data:/app/data              # persist wallet pool + position state + logs
      - ./KILL:/app/KILL:ro           # touch KILL on host → bot halts (optional)
    restart: unless-stopped

    # ▸ Paper mode (default — no real money)
    command: >
      --mode paper
      --duration-min 1440
      --max-cycles 0

    # ▸ Dry-run mode (uncomment to test live logic without orders)
    # command: >
    #   --mode dry-run
    #   --duration-min 1440
    #   --max-cycles 0
    #   --position-size 15

    # ▸ Live mode (uncomment ONLY when ready for real money)
    # command: >
    #   --mode live
    #   --duration-min 1440
    #   --max-cycles 0
    #   --position-size 15
    #   --max-daily-loss 10

  # ── Paper Test Worker (continuous, writes results to data/) ──
  paper-test:
    build: .
    container_name: polymarket-paper-test
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: >
      --mode paper
      --duration-min 14400
      --max-cycles 0

  # ── Wallet Pool Refresh (every 6 hours) ─────────────────────
  refresh:
    build: .
    container_name: polymarket-refresh
    entrypoint: ["python", "-u", "-m", "scripts.refresh_smart_wallets"]
    command: ["--freshness-hours", "48"]
    volumes:
      - ./data:/app/data
    profiles: ["refresh"]             # run manually: docker compose run refresh
