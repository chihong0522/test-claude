version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PM_DATABASE_URL=postgresql+asyncpg://polymarket:polymarket@postgres:5432/polymarket_research
      - PM_DISCORD_WEBHOOK_URL=${PM_DISCORD_WEBHOOK_URL:-}
      - PM_PIPELINE_SCHEDULE_HOUR=6
      - PM_PIPELINE_SCHEDULE_MINUTE=0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=polymarket
      - POSTGRES_PASSWORD=polymarket
      - POSTGRES_DB=polymarket_research
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
